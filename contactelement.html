<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact 3D Element</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
  .container { width: 400px; height: 400px; perspective: 800px; position: relative; }
  
  .scene {
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    animation: sceneRotate 20s ease-in-out infinite;
  }

  @keyframes sceneRotate {
    0%, 100% { transform: rotateX(-10deg) rotateY(0deg); }
    25% { transform: rotateX(5deg) rotateY(90deg); }
    50% { transform: rotateX(-5deg) rotateY(180deg); }
    75% { transform: rotateX(10deg) rotateY(270deg); }
  }

  /* Floating Envelope */
  .envelope {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateZ(0);
    transform-style: preserve-3d;
    animation: envelopeFloat 4s ease-in-out infinite;
  }

  @keyframes envelopeFloat {
    0%, 100% { transform: translate(-50%, -50%) translateZ(0) translateY(0); }
    50% { transform: translate(-50%, -50%) translateZ(30px) translateY(-15px); }
  }

  .envelope svg { filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.4)); }

  /* Orbiting Rings */
  .ring {
    position: absolute; top: 50%; left: 50%;
    border: 2px solid; border-radius: 50%;
    transform-style: preserve-3d;
    animation: ringPulse 3s ease-in-out infinite;
  }

  .ring-1 {
    width: 200px; height: 200px; margin: -100px 0 0 -100px;
    border-color: rgba(0, 212, 255, 0.3);
    animation: orbit1 8s linear infinite;
  }
  .ring-2 {
    width: 260px; height: 260px; margin: -130px 0 0 -130px;
    border-color: rgba(120, 80, 255, 0.25);
    animation: orbit2 12s linear infinite;
  }
  .ring-3 {
    width: 320px; height: 320px; margin: -160px 0 0 -160px;
    border-color: rgba(0, 212, 255, 0.15);
    animation: orbit3 16s linear infinite;
  }

  @keyframes orbit1 { 0% { transform: rotateX(70deg) rotateZ(0deg); } 100% { transform: rotateX(70deg) rotateZ(360deg); } }
  @keyframes orbit2 { 0% { transform: rotateX(50deg) rotateY(30deg) rotateZ(0deg); } 100% { transform: rotateX(50deg) rotateY(30deg) rotateZ(-360deg); } }
  @keyframes orbit3 { 0% { transform: rotateX(60deg) rotateY(-20deg) rotateZ(0deg); } 100% { transform: rotateX(60deg) rotateY(-20deg) rotateZ(360deg); } }

  /* Orbiting Dots */
  .dot {
    position: absolute; width: 8px; height: 8px;
    border-radius: 50%; top: 50%; left: 50%;
  }

  .dot-1 {
    background: #00d4ff;
    box-shadow: 0 0 15px #00d4ff, 0 0 30px rgba(0, 212, 255, 0.5);
    animation: dotOrbit1 8s linear infinite;
  }
  .dot-2 {
    background: #7850ff; width: 6px; height: 6px;
    box-shadow: 0 0 12px #7850ff, 0 0 25px rgba(120, 80, 255, 0.5);
    animation: dotOrbit2 12s linear infinite;
  }
  .dot-3 {
    background: #00d4ff; width: 5px; height: 5px;
    box-shadow: 0 0 10px #00d4ff;
    animation: dotOrbit3 6s linear infinite;
  }
  .dot-4 {
    background: #ff6bd6; width: 6px; height: 6px;
    box-shadow: 0 0 12px #ff6bd6;
    animation: dotOrbit4 10s linear infinite;
  }

  @keyframes dotOrbit1 {
    0% { transform: rotateX(70deg) rotateZ(0deg) translateX(100px) rotateZ(0deg); }
    100% { transform: rotateX(70deg) rotateZ(360deg) translateX(100px) rotateZ(-360deg); }
  }
  @keyframes dotOrbit2 {
    0% { transform: rotateX(50deg) rotateY(30deg) rotateZ(0deg) translateX(130px); }
    100% { transform: rotateX(50deg) rotateY(30deg) rotateZ(-360deg) translateX(130px); }
  }
  @keyframes dotOrbit3 {
    0% { transform: rotateX(80deg) rotateY(-40deg) rotateZ(0deg) translateX(80px); }
    100% { transform: rotateX(80deg) rotateY(-40deg) rotateZ(360deg) translateX(80px); }
  }
  @keyframes dotOrbit4 {
    0% { transform: rotateX(40deg) rotateY(60deg) rotateZ(0deg) translateX(150px); }
    100% { transform: rotateX(40deg) rotateY(60deg) rotateZ(-360deg) translateX(150px); }
  }

  /* Floating Particles */
  .particle {
    position: absolute; border-radius: 50%; background: rgba(0, 212, 255, 0.6);
    animation: particleFloat 5s ease-in-out infinite;
  }
  .p1 { width: 3px; height: 3px; top: 20%; left: 15%; animation-delay: 0s; animation-duration: 4s; }
  .p2 { width: 2px; height: 2px; top: 75%; left: 25%; animation-delay: 1s; animation-duration: 5s; background: rgba(120, 80, 255, 0.5); }
  .p3 { width: 4px; height: 4px; top: 30%; left: 80%; animation-delay: 2s; animation-duration: 6s; }
  .p4 { width: 2px; height: 2px; top: 85%; left: 70%; animation-delay: 0.5s; animation-duration: 4.5s; background: rgba(255, 107, 214, 0.4); }
  .p5 { width: 3px; height: 3px; top: 10%; left: 60%; animation-delay: 1.5s; animation-duration: 5.5s; }
  .p6 { width: 2px; height: 2px; top: 60%; left: 90%; animation-delay: 3s; animation-duration: 4s; background: rgba(120, 80, 255, 0.4); }

  @keyframes particleFloat {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
    50% { transform: translateY(-20px) scale(1.5); opacity: 1; }
  }

  /* Glow behind envelope */
  .glow {
    position: absolute; top: 50%; left: 50%;
    width: 120px; height: 120px;
    margin: -60px 0 0 -60px;
    background: radial-gradient(circle, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
    border-radius: 50%;
    animation: glowPulse 3s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.8); opacity: 1; }
  }

  /* Mouse interaction */
  .container:hover .scene { animation-play-state: paused; }
  .container:hover .envelope svg { filter: drop-shadow(0 0 35px rgba(0, 212, 255, 0.7)); }
</style>
</head>
<body>

<div class="container" id="container">
  <div class="glow"></div>

  <!-- Particles -->
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="particle p6"></div>

  <div class="scene" id="scene">
    <!-- Rings -->
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>

    <!-- Orbiting Dots -->
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
    <div class="dot dot-4"></div>

    <!-- Center Envelope -->
    <div class="envelope">
      <svg width="80" height="64" viewBox="0 0 80 64" fill="none">
        <rect x="2" y="2" width="76" height="60" rx="6" stroke="url(#grad)" stroke-width="2" fill="rgba(10,10,26,0.6)"/>
        <path d="M2 8 L40 36 L78 8" stroke="url(#grad)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M2 56 L28 34" stroke="rgba(0,212,255,0.3)" stroke-width="1.5" fill="none"/>
        <path d="M78 56 L52 34" stroke="rgba(0,212,255,0.3)" stroke-width="1.5" fill="none"/>
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="80" y2="64">
            <stop offset="0%" stop-color="#00d4ff"/>
            <stop offset="100%" stop-color="#7850ff"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>
</div>

<script>
  const container = document.getElementById('container');
  const scene = document.getElementById('scene');

  container.addEventListener('mousemove', (e) => {
    const rect = container.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width - 0.5) * 30;
    const y = ((e.clientY - rect.top) / rect.height - 0.5) * -30;
    scene.style.animation = 'none';
    scene.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  });

  container.addEventListener('mouseleave', () => {
    scene.style.animation = '';
    scene.style.transform = '';
  });
</script>

</body>
</html>
